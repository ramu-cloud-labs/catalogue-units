apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: {{ .Values.namespace }}
  # these labels are replicaset lables
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue

    template:
      metadata:
        labels:
          project: roboshop
          tier: backend
          component: catalogue
      spec:
        containers:
          - name: catalogue
            image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
            imagePullPolicy: Always
            resources:
                requests:
                    cpu: "100m"
                    memory: "128Mi"
                limits:
                    cpu: "200m"
                    memory: "256Mi"
            readinessProbe:
                # httpGet:
                #     path: /health
                #     port: 8080
                tcpSocket:
                    port: 8080
                failureThreshold: 2
                periodSeconds: 10
                initialDelaySeconds: 15

            livenessProbe:
                httpGet:
                    path: /health
                    port: 8080
                # initialDelaySeconds: 15
                periodSeconds: 10
                failureThreshold: 2
            envFrom:
                - configMapRef:
                    name: catalogue

        