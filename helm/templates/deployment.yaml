apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalogue
  namespace: {{ .Values.namespace }}

  labels:
    project: roboshop
    tier: backend
    component: catalogue

spec:
  replicas: {{ .Values.deployment.replicas }}

  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue

    spec:
      containers:
        - name: catalogue
          image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
          imagePullPolicy: Always

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"

          envFrom:
            - configMapRef:
                name: catalogue